    <script>
        // Gera o ícone V40+ via canvas e aplica como favicon + apple-touch-icon
        (function () {
            try {
                var c = document.createElement('canvas');
                c.width = c.height = 512;
                var x = c.getContext('2d');
                // Gradiente diagonal azul → roxo
                var g = x.createLinearGradient(0, 0, 512, 512);
                g.addColorStop(0, '#0ea5e9');
                g.addColorStop(1, '#8b5cf6');
                x.fillStyle = g;
                // Rounded rect (equivalente ao rounded-3xl)
                var r = 112;
                x.beginPath();
                x.moveTo(r, 0); x.lineTo(512 - r, 0); x.arcTo(512, 0, 512, r, r);
                x.lineTo(512, 512 - r); x.arcTo(512, 512, 512 - r, 512, r);
                x.lineTo(r, 512); x.arcTo(0, 512, 0, 512 - r, r);
                x.lineTo(0, r); x.arcTo(0, 0, r, 0, r);
                x.closePath(); x.fill();
                // Texto V40+
                x.fillStyle = 'white';
                x.font = '900 195px "Arial Black", Arial, sans-serif';
                x.textAlign = 'center';
                x.textBaseline = 'middle';
                x.fillText('V40+', 256, 262);
                var d = c.toDataURL('image/png');
                // Favicon
                var lf = document.createElement('link');
                lf.rel = 'icon'; lf.type = 'image/png'; lf.href = d;
                document.head.appendChild(lf);
                // Apple Touch Icon (180×180 escalado automaticamente pelo iOS)
                var la = document.createElement('link');
                la.rel = 'apple-touch-icon'; la.sizes = '512x512'; la.href = d;
                document.head.appendChild(la);
            } catch (e) { }
        })();
    </script>

    <!-- ==============================================================
         CONFIGURAÇÕES PRINCIPAIS DO SISTEMA AUTOMÁTICO ONLINE
         COLOQUE SUAS CHAVES AQUI PARA FICAR 100% AUTOMÁTICO
         ============================================================== -->
    <script>
        // Configuração do Supabase (publishable key — seguro para o frontend)
        const SUPABASE_URL = "https://mdhizwhomaovsxwxfnwf.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_dUhtXtTQ2r2XbpJfFucT4A_ejgfjBtN";

        // A GEMINI_API_KEY NÃO fica no frontend.
        // Ela é configurada como variável de ambiente no Vercel (GEMINI_API_KEY)
        // e usada exclusivamente pelo servidor em /api/chat.

        // ==============================================================

        let sb = null;
        let isSupabaseConfigured = SUPABASE_ANON_KEY && SUPABASE_ANON_KEY.length > 10;
        let user = null;
        let profile = {};
        let workouts = [];
        let activeProgram = null;
        let recentCheckins = [];

        // Checkup Visual se as chaves existem
        const warningsBox = document.getElementById('setup-warnings');
        if (!isSupabaseConfigured) {
            warningsBox.classList.remove('hidden');
            warningsBox.innerHTML += `<p class="text-[10px] text-red-200 mb-2"><b>❌ BD AUSENTE:</b> Configure as variáveis SUPABASE_URL e SUPABASE_ANON_KEY no Vercel.</p>`;
        }

        if (isSupabaseConfigured) {
            try {
                sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                sb.auth.onAuthStateChange((event, session) => {
                    if (event === 'SIGNED_IN') { user = session.user; initApp(); }
                    else if (event === 'SIGNED_OUT') location.reload();
                });
                sb.auth.getSession().then(({ data: { session } }) => {
                    if (session) { user = session.user; initApp(); }
                }).catch(err => console.log('Sessão expiada', err));
            } catch (e) {
                console.error("Supabase Error", e);
            }
        }

        // ==============================================================
        // AUTENTICAÇÃO
        // ==============================================================
        async function handleAuth(type) {
            if (!isSupabaseConfigured) {
                document.getElementById('auth-error').textContent = 'O desenvolvedor precisa configurar a chave do banco (Supabase) no código HTML para o login funcionar.';
                document.getElementById('auth-error').classList.remove('hidden');
                return;
            }

            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            const errEl = document.getElementById('auth-error');

            if (!email || !pass) { errEl.textContent = 'Preencha e-mail e senha.'; errEl.classList.remove('hidden'); return; }

            try {
                const res = type === 'signup'
                    ? await sb.auth.signUp({ email, password: pass })
                    : await sb.auth.signInWithPassword({ email, password: pass });

                if (res.error) throw res.error;

                if (type === 'signup' && res.data.user) {
                    await sb.from('profiles').upsert({ id: res.data.user.id, name: email.split('@')[0], created_at: new Date().toISOString() });
                    alert("Conta Criada! Você já pode entrar.");
                }
            } catch (ex) {
                errEl.textContent = ex.message || "Erro no login."; errEl.classList.remove('hidden');
            }
        }

        async function initApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-header').classList.remove('hidden');
            document.getElementById('app-main').classList.remove('hidden');
            document.getElementById('app-nav').classList.remove('hidden');

            await loadData();
            showPage('home', document.querySelectorAll('.nav-item')[0]);

            setTimeout(() => {
                const msg = `Bem-vindo ${profile.name ? profile.name.split(' ')[0] : 'Time Vitalidade'} ao QG Biomédico. Sua inteligência avançada está conectada! Como ajudarei a moldar seu corpo e biologia hoje?`;
                addChatMsg('ai', msg.replace(/\n/g, '<br>'));
            }, 800);
        }

        async function loadData() {
            try {
                const { data: p } = await sb.from('profiles').select('*').eq('id', user.id).single();
                if (p) profile = p || { name: 'Usuário Vitalidade', age: 40 };

                const { data: w } = await sb.from('workout_history').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
                if (w) workouts = w || [];

                const { data: prog } = await sb.from('programs')
                    .select('*').eq('user_id', user.id).eq('active', true)
                    .order('created_at', { ascending: false }).limit(1).maybeSingle();
                activeProgram = prog || null;

                const { data: ci } = await sb.from('checkins')
                    .select('*').eq('user_id', user.id)
                    .order('created_at', { ascending: false }).limit(20);
                recentCheckins = ci || [];
            } catch (e) {
                console.error("Falha ao puxar os dados do usuário:", e);
            }
        }

        // ==============================================================
        // NAVEGAÇÃO & UI RENDERING
        // ==============================================================
        function showPage(pageId, btnElement) {

        // ==============================================================
        // MOTOR DE IA
        // ==============================================================
        function prompt(t) { document.getElementById('chat-input').value = t; send(); }

        async function send() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;

            input.value = ''; addChatMsg('user', msg); showTyping();

            try {
                const responseContent = await callAI(msg);

                setTimeout(async () => {
                    hideTyping();
                    if (responseContent.text) addChatMsg('ai', responseContent.text.replace(/\n/g, '<br>'));
                    if (responseContent.isProgram && responseContent.program) {
                        await saveProgramAndRender(responseContent.program, responseContent.programUpdate);
                    } else if (responseContent.isWorkout && responseContent.workout) {
                        renderWorkoutInChat(responseContent.workout);
                    }
                }, 800);

            } catch (err) {
                hideTyping();
                addChatMsg('ai', 'Falha na conexão de inteligência. Verifique a chave GROQ no Vercel.');
                console.error(err);
            }
        }

        async function saveProgramAndRender(programData, isUpdate) {
            try {
                // Desativar programa anterior
                if (activeProgram) {
                    await sb.from('programs').update({ active: false }).eq('id', activeProgram.id);
                }
                // Salvar novo programa
                const { data: saved } = await sb.from('programs').insert({
                    user_id: user.id,
                    program_data: programData,
                    active: true
                }).select().single();
                activeProgram = saved;
            } catch (e) {
                console.error('Erro ao salvar programa:', e);
            }
            renderProgramInChat(programData, isUpdate);
            renderHome();
        }

        async function callAI(promptText) {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    prompt: promptText,
                    userProfile: profile,
                    currentProgram: activeProgram ? activeProgram.program_data : null,
                    recentCheckins: recentCheckins.slice(0, 10)
                })
            });
            if (!response.ok) throw new Error(`Erro na API: ${response.status}`);
            return await response.json();
        }

                <div class="bg-gradient-to-r from-slate-900 to-primary/10 p-4 border-b border-primary/30">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="text-primary text-xs font-bold uppercase tracking-widest">${isUpdate ? '♻️ Programa Atualizado' : '🗓️ Programa Semanal'}</span>
                    </div>
                    <h4 class="font-black text-white text-[15px]">${prog.name}</h4>
                </div>
                <div class="bg-[#0f172a]">${daysHtml}</div>
                ${prog.notes && prog.notes.length ? `<div class="p-3 bg-slate-900/50 border-t border-slate-700/50">${prog.notes.map(n => `<p class="text-[11px] text-slate-400 mb-1">• ${n}</p>`).join('')}</div>` : ''}
                <button onclick="showPage('programa', null)" class="w-full bg-primary hover:bg-blue-500 text-white p-4 font-black uppercase text-xs transition-colors">
                    📋 Ver Programa Completo
                </button>`;
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
        }

        async function saveAndConfirmChat(btn, workoutStr) {
            const data = JSON.parse(decodeURIComponent(workoutStr));
            const newRecord = { id: crypto.randomUUID(), workout_data: data, completed: false, created_at: new Date().toISOString() };

            const res = await sb.from('workout_history').insert({ user_id: user.id, workout_data: data, created_at: new Date().toISOString() }).select().single();
            workouts.unshift(res.data ? res.data : newRecord);

            btn.outerHTML = '<div class="bg-emerald-900/50 text-emerald-400 p-3 text-center text-xs font-bold uppercase tracking-wider">Salvo na Nuvem ✅</div>';
            renderHistory();
        }

        function showWorkoutDetail(id) {
            const w = workouts.find(x => x.id === id);
            const d = w.workout_data;
            const content = `
                <div class="space-y-4 pb-4">
                    ${d.exercises.map(e => `
                        <div class="glass-panel p-4 rounded-xl border border-slate-700/50">
                            <div class="flex justify-between items-start mb-2"><span class="font-bold text-white text-base leading-tight w-3/4">${e.n}</span><span class="text-primary font-black text-sm bg-primary/10 px-2 py-1 rounded-lg">${e.sets}×${e.reps}</span></div>
                            <div class="text-xs text-slate-300 font-medium bg-slate-900/60 p-2 rounded-lg mb-3">${e.c ? e.c.join('<br>') : ''}</div>
                        </div>`).join('')}
                    ${!w.completed ? `<button onclick="confirmWorkoutCompletion('${id}')" class="w-full bg-emerald-600 text-white hover:bg-emerald-500 py-4 mt-6 rounded-2xl font-black uppercase tracking-widest text-sm shadow-[0_0_15px_rgba(5,150,105,0.4)]">✅ Marcar Concluído</button>` : `<div class="bg-emerald-900/30 text-emerald-400 font-bold p-4 text-center rounded-xl border border-emerald-500/20 uppercase tracking-widest mt-6">✓ Sessão Batida</div>`}
                </div>`;
            openModal(d.name || 'Treino Detalhado', content);
        }

        async function confirmWorkoutCompletion(id) {
            const w = workouts.find(x => x.id === id); w.completed = true;
            await sb.from('workout_history').update({ completed: true, completed_at: new Date().toISOString() }).eq('id', id);
            closeModal(); renderHistory(); renderHome();
        }

        function showCheckinModal(dayKey) {
            const content = `
                <div class="space-y-5 pb-2">
                    <p class="text-sm text-slate-400 -mt-1">Registre como foi o treino de <strong class="text-white">${dayKey}</strong></p>

                    <div>
                        <label class="text-xs text-slate-400 font-bold uppercase ml-1 mb-2 block">Fadiga Percebida: <span id="fatigue-val" class="text-primary">5</span>/10</label>
                        <input type="range" id="ci-fatigue" min="1" max="10" value="5" oninput="document.getElementById('fatigue-val').textContent=this.value"
                            style="background: rgba(30,41,59,0.6) !important; padding: 8px 4px !important; border-radius: 8px !important; cursor: pointer;">
                    </div>

                    <div>
                        <label class="text-xs text-slate-400 font-bold uppercase ml-1 mb-2 block">RPE — Esforço: <span id="rpe-val" class="text-accent">5</span>/10</label>
                        <input type="range" id="ci-rpe" min="1" max="10" value="5" oninput="document.getElementById('rpe-val').textContent=this.value"
                            style="background: rgba(30,41,59,0.6) !important; padding: 8px 4px !important; border-radius: 8px !important; cursor: pointer;">
                    </div>

                    <div>
                        <label class="text-xs text-slate-400 font-bold uppercase ml-1 mb-1 block">Peso Atual (kg)</label>
                        <input type="number" id="ci-weight" placeholder="Ex: 88.5" value="${profile.weight || ''}">
                    </div>

                    <div>
                        <label class="text-xs text-slate-400 font-bold uppercase ml-1 mb-1 block">Observações</label>
                        <textarea id="ci-notes" placeholder="Como foi o treino? Alguma dor ou superação?" rows="3"
                            style="background: rgba(30,41,59,0.6) !important; border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 14px !important; padding: 14px 18px !important; color: white !important; width: 100%; box-sizing: border-box; font-size: 15px !important; resize: none; outline: none; font-family: inherit;"></textarea>
                    </div>

                    <button onclick="saveCheckin('${dayKey.replace(/'/g, '')}')" class="w-full bg-gradient-to-r from-primary to-accent py-4 rounded-2xl font-black uppercase tracking-wider text-sm shadow-lg mt-2">
                        Salvar Check-in
                    </button>
                </div>`;
            openModal('Check-in de Treino', content);
        }

        async function saveCheckin(dayKey) {
            const fatigue = parseInt(document.getElementById('ci-fatigue').value);
            const rpe = parseInt(document.getElementById('ci-rpe').value);
            const weight = parseFloat(document.getElementById('ci-weight').value) || null;
            const notes = document.getElementById('ci-notes').value.trim();

            try {
                const { error } = await sb.from('checkins').insert({
                    user_id: user.id,
                    program_id: activeProgram ? activeProgram.id : null,
                    day_key: dayKey,
                    fatigue, rpe, weight, notes
                });
                if (error) throw error;
                recentCheckins.unshift({ day_key: dayKey, fatigue, rpe, weight, notes, created_at: new Date().toISOString() });
                closeModal();
                renderHome();
                renderProgram();
                setTimeout(() => addChatMsg('ai', 'Check-in registrado! Obrigado pelo feedback — usarei esses dados para ajustar seu programa conforme necessário. 💪'), 300);
            } catch (e) {
                alert('Erro ao salvar check-in: ' + e.message);
            }
        }

        const modalEl = document.getElementById('modal');
        const modalWrapper = document.getElementById('modal-content-wrapper');

        function openModal(t, html) {
            document.getElementById('modal-title').textContent = t; document.getElementById('modal-body').innerHTML = html;
            modalEl.classList.remove('hidden'); setTimeout(() => { modalEl.classList.remove('opacity-0'); modalWrapper.classList.remove('translate-y-full'); }, 10);
        }
        function closeModal() {
            modalEl.classList.add('opacity-0'); modalWrapper.classList.add('translate-y-full'); setTimeout(() => modalEl.classList.add('hidden'), 300);
        }
    </script>
</body>

</html>
