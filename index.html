<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#09090b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Vitalidade 40+ | IA Personal Trainer Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        dark: '#09090b',
                        surface: '#18181b',
                        primary: '#0ea5e9',
                        accent: '#8b5cf6',
                        glass: 'rgba(24, 24, 27, 0.7)'
                    },
                    animation: {
                        'gradient-x': 'gradient-x 3s ease infinite',
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                            '50%': { 'background-size': '200% 200%', 'background-position': 'right center' }
                        },
                        'float': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-5px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        html {
            overflow-x: hidden;
            max-width: 100%;
        }

        body {
            background: #09090b;
            color: #f8fafc;
            margin: 0;
            padding-bottom: 90px;
            overflow-x: hidden;
            max-width: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-panel {
            background: rgba(24, 24, 27, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .page {
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease-out;
        }

        .page.active {
            display: block;
            opacity: 1;
            animation: slideInPage 0.4s forwards;
        }

        @keyframes slideInPage {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-item.active {
            color: #0ea5e9;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(14, 165, 233, 0.5);
        }

        .nav-item {
            transition: all 0.2s ease-in-out;
        }

        .chat-msg {
            max-width: 88%;
            padding: 14px 18px;
            margin-bottom: 12px;
            font-size: 15px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease-out forwards;
        }

        .chat-user {
            background: linear-gradient(135deg, #0ea5e9, #3b82f6);
            color: white;
            border-radius: 20px 20px 4px 20px;
            margin-left: auto;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
        }

        .chat-ai {
            background: #1f2937;
            color: #f1f5f9;
            border-radius: 20px 20px 20px 4px;
            margin-right: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .typing span {
            width: 6px;
            height: 6px;
            background: #94a3b8;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: bounce 1.4s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-6px);
            }
        }

        input,
        select {
            background: rgba(30, 41, 59, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 14px !important;
            padding: 14px 18px !important;
            color: white !important;
            width: 100%;
            box-sizing: border-box;
            font-size: 15px !important;
            transition: all 0.3s ease;
        }

        input:focus,
        select:focus {
            outline: none !important;
            border-color: #0ea5e9 !important;
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.2) !important;
            background: rgba(30, 41, 59, 0.9) !important;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        .hidden {
            display: none !important;
        }

        .bfr-tag {
            background: linear-gradient(90deg, #ef4444, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body>
    <!-- Setup Screen (Auth) -->
    <div id="auth-screen" class="fixed inset-0 bg-dark flex flex-col items-center p-6 z-50 overflow-y-auto pt-16">
        <div
            class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?q=80&w=2670&auto=format&fit=crop')] bg-cover bg-center opacity-10">
        </div>
        <div
            class="glass-panel w-full max-w-sm space-y-4 text-center p-8 rounded-3xl relative z-10 border-t border-l border-white/10 mx-auto">
            <div
                class="w-20 h-20 bg-gradient-to-br from-primary to-accent rounded-3xl mx-auto flex items-center justify-center shadow-[0_0_30px_rgba(139,92,246,0.3)] mb-2 animate-float">
                <span class="text-4xl text-white font-extrabold tracking-tighter">V40+</span>
            </div>
            <div>
                <h1 class="text-3xl font-black bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">
                    Vitalidade</h1>
                <p class="text-primary font-medium text-xs tracking-widest uppercase mt-1">Treinador Virtual</p>
            </div>

            <div id="auth-forms" class="space-y-4 pt-4 border-t border-white/10">
                <p class="text-xs text-slate-400 mb-4 px-2">Crie sua conta abaixo ou acesse para sincronizar seus
                    treinos de qualquer lugar.</p>
                <div class="space-y-3">
                    <input type="email" id="auth-email" placeholder="Seu E-mail" autocomplete="email">
                    <input type="password" id="auth-password" placeholder="Sua Senha" autocomplete="current-password">

                    <button onclick="handleAuth('login')"
                        class="w-full bg-gradient-to-r from-primary to-blue-600 text-white py-3.5 rounded-2xl font-bold hover:scale-[1.02] active:scale-95 transition-all shadow-lg shadow-blue-900/20">
                        Acessar Conta
                    </button>
                    <button onclick="handleAuth('signup')"
                        class="w-full bg-slate-800 border border-slate-700 text-slate-300 py-3 rounded-2xl font-bold hover:bg-slate-700 active:scale-95 transition-all">
                        Criar Nova Conta
                    </button>
                </div>
                <p id="auth-error" class="text-red-400 text-xs font-medium hidden bg-red-900/30 p-2 rounded-lg mt-2">
                </p>
                <div id="setup-warnings"
                    class="hidden text-left bg-red-900/30 border border-red-500/50 p-3 rounded-xl mt-4"></div>
            </div>
        </div>
    </div>

    <!-- Header App -->
    <header id="app-header"
        class="fixed top-0 w-full z-40 glass-panel px-5 py-3 flex justify-between items-center hidden border-b border-white/5">
        <div class="flex items-center gap-3">
            <div
                class="w-10 h-10 bg-gradient-to-br from-primary to-accent rounded-xl flex items-center justify-center shadow-lg">
                <span class="text-white font-bold text-lg">V</span>
            </div>
            <div>
                <h1 class="font-bold text-base text-white tracking-wide">Vitalidade 40+</h1>
                <p class="text-[11px] text-primary uppercase tracking-wider font-semibold" id="ai-status">Coach
                    Integrativo</p>
            </div>
        </div>
        <div class="flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/20 px-3 py-1.5 rounded-full"
            id="ai-indicator">
            <div class="w-2 h-2 bg-emerald-400 rounded-full shadow-[0_0_8px_rgba(52,211,153,0.8)] animate-pulse"></div>
            <span class="text-[10px] text-emerald-400 font-bold tracking-wide">IA ATIVA</span>
        </div>
    </header>

    <main id="app-main" class="pt-20 px-5 hidden h-full">
        <!-- HOME -->
        <div id="page-home" class="page active">
            <div id="welcome-section"></div>
        </div>

        <!-- IA CHAT -->
        <div id="page-ia" class="page flex-col h-[calc(100vh-160px)]">
            <div class="glass-panel mb-3 p-3 rounded-2xl flex items-center gap-3 relative">
                <div
                    class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-xl border border-slate-700">
                    🧠</div>
                <div>
                    <h3 class="text-xs font-bold text-slate-200">Biomecânica & Longevidade</h3>
                    <p class="text-[10px] text-slate-400">Padrões TAURIAN | Especialista +40</p>
                </div>
            </div>

            <div id="chat-messages" class="flex-1 overflow-y-auto space-y-4 pb-20 pr-1 mask-image-bottom">
                <!-- Chat goes here -->
            </div>

            <div class="fixed bottom-20 left-0 right-0 px-4 glass-panel pt-3 pb-4 border-t border-white/10 z-30">
                <div class="flex gap-2 mb-3 overflow-x-auto pb-1 hide-scrollbar">
                    <button
                        onclick="prompt('Gerar meu Treino Concorrente de hoje (foco evitar fadiga e hipertrofia segura)')"
                        class="whitespace-nowrap bg-slate-800 hover:bg-slate-700 text-xs px-4 py-2 rounded-xl border border-slate-600 font-medium transition-colors">🔥
                        Gerar Treino Seguro</button>
                    <button onclick="prompt('Resumo metabólico: Como HIIT me ajuda a perder gordura visceral?')"
                        class="whitespace-nowrap bg-slate-800 hover:bg-slate-700 text-xs px-4 py-2 rounded-xl border border-slate-600 font-medium transition-colors">💥
                        Secar Visceral</button>
                    <button onclick="prompt('Explicar Restrição de Fluxo Sanguíneo (BFR) para dores nas articulações')"
                        class="whitespace-nowrap bg-primary/20 text-primary text-xs px-4 py-2 rounded-xl border border-primary/30 font-bold transition-colors">🩸
                        Método BFR</button>
                </div>
                <div class="flex gap-2 relative">
                    <input type="text" id="chat-input" placeholder="Qual músculo deseja treinar hoje?"
                        onkeypress="if(event.key==='Enter')send()"
                        class="pl-4 pr-12 py-3.5 bg-slate-900 border-slate-700 text-sm">
                    <button onclick="send()"
                        class="absolute right-1 top-1 bottom-1 w-11 bg-primary rounded-xl flex items-center justify-center hover:bg-blue-500 transition-colors">
                        <svg class="w-5 h-5 text-white ml-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- PERFIL -->
        <div id="page-perfil" class="page pb-6">
            <div id="profile-content"></div>
        </div>

        <!-- HISTÓRICO -->
        <div id="page-historico" class="page">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h2 class="text-2xl font-black tracking-tight">Histórico</h2>
                    <p class="text-sm text-slate-400">Progresso fisiológico</p>
                </div>
                <div class="text-primary font-bold text-xl" id="history-total">0</div>
            </div>
            <div id="history-list" class="space-y-4"></div>
        </div>
    </main>

    <!-- Navigation -->
    <nav id="app-nav"
        class="fixed bottom-0 left-0 right-0 glass-panel border-t border-white/5 flex justify-around pt-3 pb-6 z-40 hidden">
        <button class="nav-item active flex flex-col items-center gap-1 text-slate-400 w-16"
            onclick="showPage('home', this)">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            <span class="text-[10px] font-bold tracking-wide">Início</span>
        </button>
        <button class="nav-item flex flex-col items-center gap-1 text-slate-400 w-16" onclick="showPage('ia', this)">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
            <span class="text-[10px] font-bold tracking-wide">IA Coach</span>
        </button>
        <button class="nav-item flex flex-col items-center gap-1 text-slate-400 w-16"
            onclick="showPage('historico', this)">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>
            <span class="text-[10px] font-bold tracking-wide">Evolução</span>
        </button>
        <button class="nav-item flex flex-col items-center gap-1 text-slate-400 w-16"
            onclick="showPage('perfil', this)">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            <span class="text-[10px] font-bold tracking-wide">Perfil</span>
        </button>
    </nav>

    <!-- MODAL PREMIUM -->
    <div id="modal"
        class="fixed inset-0 bg-black/80 z-50 hidden opacity-0 transition-opacity duration-300 items-end sm:items-center justify-center p-0 sm:p-4 pb-0 backdrop-blur-sm">
        <div class="glass-panel w-full sm:max-w-md h-[85vh] sm:h-auto sm:max-h-[85vh] rounded-t-3xl sm:rounded-3xl flex flex-col shadow-2xl transform translate-y-full transition-transform duration-300"
            id="modal-content-wrapper">
            <div class="p-5 border-b border-white/10 flex justify-between items-center bg-slate-900/50 rounded-t-3xl">
                <h3 id="modal-title" class="text-xl font-bold tracking-tight text-white"></h3>
                <button onclick="closeModal()"
                    class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-slate-300 hover:bg-white/20 hover:text-white transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div id="modal-body" class="p-5 overflow-y-auto flex-1 space-y-4"></div>
        </div>
    </div>

    <!-- ==============================================================
         CONFIGURAÇÕES PRINCIPAIS DO SISTEMA AUTOMÁTICO ONLINE
         COLOQUE SUAS CHAVES AQUI PARA FICAR 100% AUTOMÁTICO
         ============================================================== -->
    <script>
        // Configuração do Supabase (publishable key — seguro para o frontend)
        const SUPABASE_URL = "https://mdhizwhomaovsxwxfnwf.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_dUhtXtTQ2r2XbpJfFucT4A_ejgfjBtN";

        // A GEMINI_API_KEY NÃO fica no frontend.
        // Ela é configurada como variável de ambiente no Vercel (GEMINI_API_KEY)
        // e usada exclusivamente pelo servidor em /api/chat.

        // ==============================================================

        let sb = null;
        let isSupabaseConfigured = SUPABASE_ANON_KEY && SUPABASE_ANON_KEY.length > 10;
        let user = null;
        let profile = {};
        let workouts = [];

        // Checkup Visual se as chaves existem
        const warningsBox = document.getElementById('setup-warnings');
        if (!isSupabaseConfigured) {
            warningsBox.classList.remove('hidden');
            warningsBox.innerHTML += `<p class="text-[10px] text-red-200 mb-2"><b>❌ BD AUSENTE:</b> Configure as variáveis SUPABASE_URL e SUPABASE_ANON_KEY no Vercel.</p>`;
        }

        if (isSupabaseConfigured) {
            try {
                sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                sb.auth.onAuthStateChange((event, session) => {
                    if (event === 'SIGNED_IN') { user = session.user; initApp(); }
                    else if (event === 'SIGNED_OUT') location.reload();
                });
                sb.auth.getSession().then(({ data: { session } }) => {
                    if (session) { user = session.user; initApp(); }
                }).catch(err => console.log('Sessão expiada', err));
            } catch (e) {
                console.error("Supabase Error", e);
            }
        }

        // ==============================================================
        // AUTENTICAÇÃO
        // ==============================================================
        async function handleAuth(type) {
            if (!isSupabaseConfigured) {
                document.getElementById('auth-error').textContent = 'O desenvolvedor precisa configurar a chave do banco (Supabase) no código HTML para o login funcionar.';
                document.getElementById('auth-error').classList.remove('hidden');
                return;
            }

            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            const errEl = document.getElementById('auth-error');

            if (!email || !pass) { errEl.textContent = 'Preencha e-mail e senha.'; errEl.classList.remove('hidden'); return; }

            try {
                const res = type === 'signup'
                    ? await sb.auth.signUp({ email, password: pass })
                    : await sb.auth.signInWithPassword({ email, password: pass });

                if (res.error) throw res.error;

                if (type === 'signup' && res.data.user) {
                    await sb.from('profiles').upsert({ id: res.data.user.id, name: email.split('@')[0], created_at: new Date().toISOString() });
                    alert("Conta Criada! Você já pode entrar.");
                }
            } catch (ex) {
                errEl.textContent = ex.message || "Erro no login."; errEl.classList.remove('hidden');
            }
        }

        async function initApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-header').classList.remove('hidden');
            document.getElementById('app-main').classList.remove('hidden');
            document.getElementById('app-nav').classList.remove('hidden');

            await loadData();
            showPage('home', document.querySelectorAll('.nav-item')[0]);

            setTimeout(() => {
                const msg = `Bem-vindo ${profile.name ? profile.name.split(' ')[0] : 'Time Vitalidade'} ao QG Biomédico. Sua inteligência avançada está conectada! Como ajudarei a moldar seu corpo e biologia hoje?`;
                addChatMsg('ai', msg.replace(/\n/g, '<br>'));
            }, 800);
        }

        async function loadData() {
            try {
                const { data: p } = await sb.from('profiles').select('*').eq('id', user.id).single();
                if (p) profile = p || { name: 'Usuário Vitalidade', age: 40 };

                const { data: w } = await sb.from('workout_history').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
                if (w) workouts = w || [];
            } catch (e) {
                console.error("Falha ao puxar os dados do usuário:", e);
            }
        }

        // ==============================================================
        // NAVEGAÇÃO & UI RENDERING
        // ==============================================================
        function showPage(pageId, btnElement) {
            document.querySelectorAll('.page').forEach(p => { p.classList.remove('active'); p.style.display = 'none'; });
            const target = document.getElementById(`page-${pageId}`);
            target.style.display = pageId === 'ia' ? 'flex' : 'block';
            setTimeout(() => target.classList.add('active'), 10);

            if (btnElement) {
                document.querySelectorAll('.nav-item').forEach(b => { b.classList.remove('active'); b.classList.add('text-slate-400'); });
                btnElement.classList.add('active'); btnElement.classList.remove('text-slate-400');
            }
            if (pageId === 'home') renderHome();
            if (pageId === 'perfil') renderProfile();
            if (pageId === 'historico') renderHistory();
        }

        function renderHome() {
            const el = document.getElementById('welcome-section');
            const doneTotal = workouts.filter(x => x.completed).length;
            const nm = profile.name ? profile.name.split(' ')[0] : 'Atleta';

            el.innerHTML = `
                <div class="glass-panel rounded-3xl p-6 mb-6 border border-emerald-500/20 relative overflow-hidden mt-2">
                    <div class="absolute top-0 right-0 w-40 h-40 bg-emerald-500/10 rounded-full blur-3xl"></div>
                    <div class="flex justify-between items-start mb-4 relative z-10">
                        <div>
                            <h2 class="text-2xl font-black mb-1">Olá, ${nm}</h2>
                            <p class="text-sm text-slate-300 font-medium">${profile.age || '?'} anos • Foco: ${profile.objective === 'perda_gordura' ? 'Metabólico/HIIT' : 'Hipertrofia'}</p>
                        </div>
                        <div class="w-12 h-12 bg-emerald-500/20 text-emerald-400 rounded-2xl flex items-center justify-center text-2xl font-black border border-emerald-500/40 shadow-[0_0_15px_rgba(16,185,129,0.2)]">⚡</div>
                    </div>
                    
                    <div class="bg-slate-900/50 p-4 rounded-2xl border border-white/5 mb-5 space-y-2">
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-slate-400">Sistema Concorrente</span>
                            <span class="text-white font-bold tag bg-primary/20 text-primary px-2 py-0.5 rounded text-xs">Ativo</span>
                        </div>
                        <p class="text-[11px] text-slate-400 leading-tight">Protocolo integrado combatendo DAEM e Sarcopenia com base na clínica ACSM.</p>
                    </div>

                    <button onclick="document.querySelectorAll('.nav-item')[1].click()" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 py-4 rounded-2xl font-bold flex justify-center items-center gap-2 shadow-lg shadow-emerald-500/20 transition-all font-outfit uppercase tracking-wider text-sm">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        Acessar Treino de Hoje
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="glass-panel p-4 rounded-2xl">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-primary/20 rounded-xl flex items-center justify-center text-primary border border-primary/20"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
                            <div>
                                <div class="text-xl font-bold text-white leading-none">${doneTotal}</div>
                                <div class="text-[10px] text-slate-400 uppercase font-bold mt-1">Concluídos</div>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        function renderProfile() {
            const p = profile;
            document.getElementById('profile-content').innerHTML = `
                <h2 class="text-2xl font-black mb-6">Prontuário Médico & Esportivo</h2>
                <form id="profile-form" class="space-y-4 pb-20">
                    <div class="space-y-1">
                        <label class="text-xs text-slate-400 font-bold uppercase ml-2">Identificação</label>
                        <input type="text" id="p_name" value="${p.name || ''}" placeholder="Nome Completo" required>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-xs text-slate-400 font-bold uppercase ml-2">Idade biológica</label>
                            <input type="number" id="p_age" value="${p.age || ''}" placeholder="Idade (>40)" required>
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs text-slate-400 font-bold uppercase ml-2">Peso (kg)</label>
                            <input type="number" id="p_weight" value="${p.weight || ''}" placeholder="Massa Corporal">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs text-slate-400 font-bold uppercase ml-2">Nível Muscular Base</label>
                        <select id="p_level" class="appearance-none">
                            <option value="iniciante" ${p.level === 'iniciante' ? 'selected' : ''}>Adaptação Tíssular (Iniciante)</option>
                            <option value="intermediario" ${p.level === 'intermediario' ? 'selected' : ''}>Consolidado (Intermediário)</option>
                            <option value="avancado" ${p.level === 'avancado' ? 'selected' : ''}>Atleta Master (Avançado)</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs text-slate-400 font-bold uppercase ml-2">Alvo Fisiológico Principal</label>
                        <select id="p_obj" class="appearance-none">
                            <option value="hipertrofia" ${p.objective === 'hipertrofia' ? 'selected' : ''}>Sarcopenia: Foco Miofibrilar (Massa)</option>
                            <option value="perda_gordura" ${p.objective === 'perda_gordura' ? 'selected' : ''}>Reversão DAEM: Secar Gordura Visceral</option>
                        </select>
                    </div>
                    <div class="glass-panel p-4 rounded-2xl bg-red-900/10 border-red-500/20 mt-2">
                        <label class="text-xs text-red-400 font-bold uppercase mb-2 block">Cálculo de Risco Articular</label>
                        <select id="p_inj" class="border-red-500/30 text-red-100 bg-red-900/20">
                            <option value="false" ${!p.hasInjury ? 'selected' : ''}>Articulações Saudáveis (Sem Restrição)</option>
                            <option value="true" ${p.hasInjury ? 'selected' : ''}>⚠️ Possuo Desgaste Articular/Tendineo (Ativar BFR)</option>
                        </select>
                        <p class="text-[10px] text-slate-400 mt-2">Nota: Acionar esta flag recalibrará a IA para aplicar métodos de Restrição de Fluxo Sanguíneo (BFR).</p>
                    </div>
                    <button type="button" onclick="saveProfileData()" class="w-full bg-gradient-to-r from-primary to-accent text-white py-4 rounded-2xl font-bold uppercase tracking-wider shadow-[0_0_20px_rgba(139,92,246,0.3)] mt-6">
                        Atualizar e Salvar na Nuvem
                    </button>
                    
                    <button type="button" onclick="sb.auth.signOut()" class="w-full bg-red-900/50 text-red-300 py-3 rounded-xl hover:bg-red-900 mt-4 font-bold border border-red-500/30">SAIR DA CONTA</button>
                </form>
            `;
        }

        async function saveProfileData() {
            const data = {
                name: document.getElementById('p_name').value,
                age: Number(document.getElementById('p_age').value),
                weight: Number(document.getElementById('p_weight').value),
                level: document.getElementById('p_level').value,
                objective: document.getElementById('p_obj').value,
                hasInjury: document.getElementById('p_inj').value === 'true'
            };
            profile = { ...profile, ...data };

            const { error } = await sb.from('profiles').upsert({ id: user.id, ...data, updated_at: new Date().toISOString() });
            alert(error ? 'Erro: ' + error.message : 'Prontuário salvo na Nuvem com sucesso!');
            renderHome();
        }

        function renderHistory() {
            document.getElementById('history-total').textContent = workouts.length;
            document.getElementById('history-list').innerHTML = workouts.length === 0
                ? '<div class="glass-panel p-8 text-center rounded-2xl border-dashed"><span class="text-4xl text-slate-600 block mb-2">📋</span><p class="text-sm text-slate-500">Nenhuma sessão registrada.<br>A disciplina clínica começa hoje.</p></div>'
                : workouts.map(w => {
                    const data = new Date(w.created_at).toLocaleDateString('pt-BR');
                    return `
                    <div class="glass-panel p-4 rounded-2xl cursor-pointer hover:bg-slate-800 transition shadow-sm" onclick="showWorkoutDetail('${w.id}')">
                        <div class="flex justify-between items-start mb-2">
                            <span class="font-bold text-sm text-slate-200">${w.workout_data.name || 'Sessão Metabólica'}</span>
                            <span class="text-[10px] bg-slate-800 text-slate-400 px-2 py-1 rounded font-mono">${data}</span>
                        </div>
                        <div class="flex gap-2 items-center">
                            <span class="tag bg-slate-800 border border-slate-700 text-slate-300 px-2 py-0.5 rounded text-xs font-semibold">${w.workout_data.exercises?.length || 0} Ex.</span>
                            ${w.completed
                            ? '<span class="tag bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-2 py-0.5 rounded text-xs font-semibold flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>Concluído</span>'
                            : '<span class="tag bg-amber-500/20 text-amber-400 border border-amber-500/30 px-2 py-0.5 rounded text-xs font-semibold flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Pendente</span>'}
                        </div>
                    </div>`
                }).join('');
        }

        // ==============================================================
        // MOTOR DE IA
        // ==============================================================
        function prompt(t) { document.getElementById('chat-input').value = t; send(); }

        async function send() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;

            input.value = ''; addChatMsg('user', msg); showTyping();

            try {
                const responseContent = await callGeminiAPI(msg, profile);

                setTimeout(() => {
                    hideTyping();
                    if (responseContent.text) addChatMsg('ai', responseContent.text.replace(/\n/g, '<br>'));
                    if (responseContent.isWorkout && responseContent.workout) renderWorkoutInChat(responseContent.workout);
                }, 800);

            } catch (err) {
                hideTyping();
                addChatMsg('ai', 'Falha na conexão de inteligência. A chave Google Gemini configurada é válida?');
                console.error(err);
            }
        }

        async function callGeminiAPI(promptText, userProfile) {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    prompt: promptText,
                    userProfile: userProfile,
                    history: []
                })
            });
            if (!response.ok) throw new Error(`Erro na API: ${response.status}`);
            return await response.json();
        }

        function fallbackTAURIANMock(text, p) {
            const t = text.toLowerCase();
            if (t.includes('treino')) {
                return {
                    text: `Modo Guiado! Montei o protocolo base visando sobrecarga metabólica para Sarcopenia. ${p.hasInjury ? 'Com BFR devida a sua restrição.' : ''}`,
                    isWorkout: true,
                    workout: {
                        name: "Vitalidade Premium (Modo Guiado)",
                        exercises: [
                            { n: 'Supino Reto Convergente', sets: 4, reps: '8-10', t: 90, bfr: false, c: ['3 seg de Excêntrica'], video_url: 'https://vimeo.com/12345' },
                            { n: 'Leg Press Isolado', sets: 4, reps: '12-15', t: 120, bfr: p.hasInjury, c: ['Evite trancos nas patelas'], video_url: 'https://vimeo.com/23456' },
                        ]
                    }
                };
            }
            return { text: "Os protocolos offline estão ativos! Cole sua chave Gemini no código HTML para desbloquear a resposta dinâmica ilimitada.", isWorkout: false };
        }

        function addChatMsg(type, html) {
            const c = document.getElementById('chat-messages');
            const d = document.createElement('div'); d.className = `chat-msg chat-${type}`; d.innerHTML = html;
            c.appendChild(d); c.scrollTop = c.scrollHeight;
        }
        function showTyping() {
            const c = document.getElementById('chat-messages');
            const d = document.createElement('div'); d.id = 'typing'; d.className = 'chat-msg chat-ai px-4 py-3 w-fit';
            d.innerHTML = '<div class="typing flex"><span></span><span></span><span></span></div>';
            c.appendChild(d); c.scrollTop = c.scrollHeight;
        }
        function hideTyping() { const d = document.getElementById('typing'); if (d) d.remove(); }

        function renderWorkoutInChat(w) {
            w.id = w.id || crypto.randomUUID();
            const c = document.getElementById('chat-messages');
            const d = document.createElement('div'); d.className = 'chat-msg chat-ai p-0 overflow-hidden w-full max-w-[100%]';

            let exHtml = w.exercises.map((e, idx) => `
                <div class="bg-slate-800/80 p-3 rounded-xl border border-slate-700/50 mb-2">
                    <div class="flex justify-between items-start">
                        <div class="max-w-[75%]"><span class="font-bold text-[13px] text-white">${idx + 1}. ${e.n}</span></div>
                        <div class="text-right"><span class="text-primary font-black text-base">${e.sets}</span><span class="text-blue-400 text-[10px] block">${e.reps} r</span></div>
                    </div>
                </div>`).join('');

            d.innerHTML = `
                <div class="bg-slate-900 p-4 border-b border-primary/20"><h4 class="font-black text-white text-[15px]">${w.name}</h4></div>
                <div class="p-3 space-y-3 bg-[#0f172a]">${exHtml}</div>
                <button onclick="saveAndConfirmChat(this, '${encodeURIComponent(JSON.stringify(w))}')" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white p-4 font-black uppercase text-xs">
                    ✅ Registrar este Protocolo
                </button>`;
            c.appendChild(d); c.scrollTop = c.scrollHeight;
        }

        async function saveAndConfirmChat(btn, workoutStr) {
            const data = JSON.parse(decodeURIComponent(workoutStr));
            const newRecord = { id: crypto.randomUUID(), workout_data: data, completed: false, created_at: new Date().toISOString() };

            const res = await sb.from('workout_history').insert({ user_id: user.id, workout_data: data, created_at: new Date().toISOString() }).select().single();
            workouts.unshift(res.data ? res.data : newRecord);

            btn.outerHTML = '<div class="bg-emerald-900/50 text-emerald-400 p-3 text-center text-xs font-bold uppercase tracking-wider">Salvo na Nuvem ✅</div>';
            renderHistory();
        }

        function showWorkoutDetail(id) {
            const w = workouts.find(x => x.id === id);
            const d = w.workout_data;
            const content = `
                <div class="space-y-4 pb-4">
                    ${d.exercises.map(e => `
                        <div class="glass-panel p-4 rounded-xl border border-slate-700/50">
                            <div class="flex justify-between items-start mb-2"><span class="font-bold text-white text-base leading-tight w-3/4">${e.n}</span><span class="text-primary font-black text-sm bg-primary/10 px-2 py-1 rounded-lg">${e.sets}×${e.reps}</span></div>
                            <div class="text-xs text-slate-300 font-medium bg-slate-900/60 p-2 rounded-lg mb-3">${e.c ? e.c.join('<br>') : ''}</div>
                        </div>`).join('')}
                    ${!w.completed ? `<button onclick="confirmWorkoutCompletion('${id}')" class="w-full bg-emerald-600 text-white hover:bg-emerald-500 py-4 mt-6 rounded-2xl font-black uppercase tracking-widest text-sm shadow-[0_0_15px_rgba(5,150,105,0.4)]">✅ Marcar Concluído</button>` : `<div class="bg-emerald-900/30 text-emerald-400 font-bold p-4 text-center rounded-xl border border-emerald-500/20 uppercase tracking-widest mt-6">✓ Sessão Batida</div>`}
                </div>`;
            openModal(d.name || 'Treino Detalhado', content);
        }

        async function confirmWorkoutCompletion(id) {
            const w = workouts.find(x => x.id === id); w.completed = true;
            await sb.from('workout_history').update({ completed: true, completed_at: new Date().toISOString() }).eq('id', id);
            closeModal(); renderHistory(); renderHome();
        }

        const modalEl = document.getElementById('modal');
        const modalWrapper = document.getElementById('modal-content-wrapper');

        function openModal(t, html) {
            document.getElementById('modal-title').textContent = t; document.getElementById('modal-body').innerHTML = html;
            modalEl.classList.remove('hidden'); setTimeout(() => { modalEl.classList.remove('opacity-0'); modalWrapper.classList.remove('translate-y-full'); }, 10);
        }
        function closeModal() {
            modalEl.classList.add('opacity-0'); modalWrapper.classList.add('translate-y-full'); setTimeout(() => modalEl.classList.add('hidden'), 300);
        }
    </script>
</body>

</html>
